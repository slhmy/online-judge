syntax = "proto3";

package judge.v1;

option go_package = "github.com/slhmy/online-judge/gen/go/judge/v1;judgev1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/common.proto";

// Judge Service - Judgehost registration, heartbeat, task assignment, and rejudging
service JudgeService {
  // Register a judgehost and get assigned queue name
  rpc RegisterJudgehost(RegisterJudgehostRequest) returns (RegisterJudgehostResponse) {
    option (google.api.http) = {
      post: "/internal/judge/judgehosts"
      body: "*"
    };
  }

  // Send heartbeat to update judgehost status
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {
    option (google.api.http) = {
      post: "/internal/judge/judgehosts/{judgehost_id}/heartbeat"
      body: "*"
    };
  }

  // Assign a task to a judgehost based on load strategy
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse) {
    option (google.api.http) = {
      post: "/internal/judge/tasks/assign"
      body: "*"
    };
  }

  // List all registered judgehosts (for monitoring)
  rpc ListJudgehosts(ListJudgehostsRequest) returns (ListJudgehostsResponse) {
    option (google.api.http) = {
      get: "/internal/judge/judgehosts"
    };
  }

  // Get judgehost details
  rpc GetJudgehost(GetJudgehostRequest) returns (GetJudgehostResponse) {
    option (google.api.http) = {
      get: "/internal/judge/judgehosts/{judgehost_id}"
    };
  }

  // Deregister a judgehost
  rpc DeregisterJudgehost(DeregisterJudgehostRequest) returns (DeregisterJudgehostResponse) {
    option (google.api.http) = {
      delete: "/internal/judge/judgehosts/{judgehost_id}"
    };
  }

  // Create a rejudge request (admin only)
  rpc CreateRejudge(CreateRejudgeRequest) returns (CreateRejudgeResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/rejudges"
      body: "*"
    };
  }

  // Get rejudge status and details
  rpc GetRejudge(GetRejudgeRequest) returns (GetRejudgeResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/rejudges/{id}"
    };
  }

  // List rejudges with pagination and filters
  rpc ListRejudges(ListRejudgesRequest) returns (ListRejudgesResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/rejudges"
    };
  }

  // Cancel a pending rejudge
  rpc CancelRejudge(CancelRejudgeRequest) returns (CancelRejudgeResponse) {
    option (google.api.http) = {
      delete: "/api/v1/admin/rejudges/{id}"
    };
  }

  // Apply rejudge results (make new verdicts official)
  rpc ApplyRejudge(ApplyRejudgeRequest) returns (ApplyRejudgeResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/rejudges/{id}/apply"
    };
  }

  // Revert rejudge results (restore original verdicts)
  rpc RevertRejudge(RevertRejudgeRequest) returns (RevertRejudgeResponse) {
    option (google.api.http) = {
      post: "/api/v1/admin/rejudges/{id}/revert"
    };
  }

  // Get affected submissions for a rejudge
  rpc GetRejudgeSubmissions(GetRejudgeSubmissionsRequest) returns (GetRejudgeSubmissionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/rejudges/{rejudge_id}/submissions"
    };
  }

  // Internal: Update rejudging submission status (for judge daemon)
  rpc InternalUpdateRejudgeSubmission(InternalUpdateRejudgeSubmissionRequest) returns (InternalUpdateRejudgeSubmissionResponse) {
    option (google.api.http) = {
      post: "/internal/rejudges/{rejudge_id}/submissions"
      body: "*"
    };
  }
}

// Judgehost status
enum JudgehostStatus {
  JUDGEHOST_STATUS_UNSPECIFIED = 0;
  JUDGEHOST_STATUS_IDLE = 1;       // Available for tasks
  JUDGEHOST_STATUS_BUSY = 2;       // Currently processing a task
  JUDGEHOST_STATUS_OFFLINE = 3;    // Not responding to heartbeats
  JUDGEHOST_STATUS_ERROR = 4;      // In error state
}

// Judgehost capabilities
message JudgehostCapabilities {
  repeated string languages = 1;           // Supported languages (e.g., "cpp17", "python3")
  int32 max_concurrent_jobs = 2;           // Maximum concurrent judging jobs
  int64 memory_limit = 3;                  // Maximum memory per job (KB)
  double time_limit = 4;                   // Maximum time per job (seconds)
  bool supports_interactive = 5;           // Can handle interactive problems
  bool supports_special = 6;               // Can handle special judges
  map<string, string> extra = 7;           // Additional capabilities
}

// Judgehost info
message Judgehost {
  string id = 1;                           // Judgehost identifier
  string queue_name = 2;                   // Assigned queue name (e.g., "judgehost-001")
  JudgehostCapabilities capabilities = 3;  // Judgehost capabilities
  JudgehostStatus status = 4;              // Current status
  string current_job_id = 5;               // Current job being processed (if busy)
  string last_ping = 6;                    // Last heartbeat timestamp (RFC3339)
  int32 active_jobs = 7;                   // Number of active jobs
  int32 completed_jobs = 8;                // Total completed jobs
  string registered_at = 9;                // Registration timestamp (RFC3339)
}

// Request/Response messages
message RegisterJudgehostRequest {
  string judgehost_id = 1;                 // Unique judgehost identifier
  JudgehostCapabilities capabilities = 2;  // Judgehost capabilities
}

message RegisterJudgehostResponse {
  string judgehost_id = 1;
  string queue_name = 2;                   // Assigned queue name for this judgehost
  JudgehostStatus status = 3;              // Initial status (IDLE)
}

message HeartbeatRequest {
  string judgehost_id = 1;
  JudgehostStatus status = 2;              // Current status
  string current_job_id = 3;               // Current job ID (if busy)
  int32 active_jobs = 4;                   // Number of active jobs
  repeated string completed_job_ids = 5;   // Jobs completed since last heartbeat
}

message HeartbeatResponse {
  bool acknowledged = 1;
  int32 pending_tasks = 2;                 // Number of pending tasks in queue
  repeated string assigned_task_ids = 3;   // New tasks assigned (if status was IDLE)
}

message AssignTaskRequest {
  string submission_id = 1;                // Submission ID to assign
  string problem_id = 2;                   // Problem ID (for capability matching)
  string language_id = 3;                  // Language ID (for capability matching)
  int32 priority = 4;                      // Task priority (0=normal, higher=urgent)
  bool interactive = 5;                    // Requires interactive support
  bool special = 6;                        // Requires special judge support
}

message AssignTaskResponse {
  string submission_id = 1;
  string judgehost_id = 2;                 // Assigned judgehost (empty if queued to default)
  string queue_name = 3;                   // Queue name for the task
  bool assigned = 4;                       // Whether task was assigned to a specific judgehost
}

message ListJudgehostsRequest {
  JudgehostStatus status_filter = 1;       // Filter by status (optional)
  int32 page = 2;
  int32 page_size = 3;
}

message ListJudgehostsResponse {
  repeated Judgehost judgehosts = 1;
  int32 total = 2;
}

message GetJudgehostRequest {
  string judgehost_id = 1;
}

message GetJudgehostResponse {
  Judgehost judgehost = 1;
}

message DeregisterJudgehostRequest {
  string judgehost_id = 1;
  bool force = 2;                          // Force deregister even if busy
}

message DeregisterJudgehostResponse {
  string judgehost_id = 1;
  bool success = 2;
  int32 reassigned_tasks = 3;              // Number of tasks reassigned to other hosts
}

// ============= Rejudge types =============

// Rejudge status
enum RejudgeStatus {
  REJUDGE_STATUS_UNSPECIFIED = 0;
  REJUDGE_STATUS_PENDING = 1;     // Created, waiting to start
  REJUDGE_STATUS_JUDGING = 2;     // Judging in progress
  REJUDGE_STATUS_JUDGED = 3;      // All submissions judged, ready to apply
  REJUDGE_STATUS_APPLIED = 4;     // Results applied
  REJUDGE_STATUS_REVERTED = 5;    // Results reverted
  REJUDGE_STATUS_CANCELLED = 6;   // Cancelled before completion
}

// RejudgeSubmission status
enum RejudgeSubmissionStatus {
  REJUDGE_SUBMISSION_STATUS_UNSPECIFIED = 0;
  REJUDGE_SUBMISSION_STATUS_PENDING = 1;
  REJUDGE_SUBMISSION_STATUS_JUDGING = 2;
  REJUDGE_SUBMISSION_STATUS_DONE = 3;
}

// Rejudge record
message Rejudge {
  string id = 1;
  string user_id = 2;             // admin who created it
  string contest_id = 3;          // optional
  string problem_id = 4;          // optional filter

  RejudgeStatus status = 5;
  string reason = 6;

  int32 affected_count = 7;
  int32 judged_count = 8;         // submissions already judged
  int32 pending_count = 9;        // submissions still pending

  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp finished_at = 12;
  google.protobuf.Timestamp applied_at = 13;
  google.protobuf.Timestamp reverted_at = 14;
}

// RejudgeSubmission - individual submission in a rejudge
message RejudgeSubmission {
  string submission_id = 1;
  string original_judging_id = 2;
  string new_judging_id = 3;

  string original_verdict = 4;
  string new_verdict = 5;
  bool verdict_changed = 6;

  RejudgeSubmissionStatus status = 7;
}

// Rejudge Request/Response messages
message CreateRejudgeRequest {
  // Either specify specific submissions or use filters
  repeated string submission_ids = 1;

  // Filters (used if submission_ids is empty)
  string contest_id = 2;          // rejudge all submissions in contest
  string problem_id = 3;          // rejudge all submissions for problem
  string from_verdict = 4;        // filter by original verdict

  string reason = 5;              // why this rejudge is needed
}

message CreateRejudgeResponse {
  string id = 1;
  int32 affected_count = 2;       // number of submissions to rejudge
  RejudgeStatus status = 3;
}

message GetRejudgeRequest {
  string id = 1;
}

message GetRejudgeResponse {
  Rejudge rejudge = 1;
}

message ListRejudgesRequest {
  common.v1.Pagination pagination = 1;

  // Filters
  string contest_id = 2;
  string problem_id = 3;
  RejudgeStatus status = 4;
  string user_id = 5;
}

message ListRejudgesResponse {
  repeated Rejudge rejudges = 1;
  common.v1.PaginatedResponse pagination = 2;
}

message CancelRejudgeRequest {
  string id = 1;
}

message CancelRejudgeResponse {
  string id = 1;
  RejudgeStatus status = 2;      // should be CANCELLED
}

message ApplyRejudgeRequest {
  string id = 1;
}

message ApplyRejudgeResponse {
  string id = 1;
  int32 verdicts_changed = 2;    // number of submissions with changed verdicts
  RejudgeStatus status = 3;      // should be APPLIED
}

message RevertRejudgeRequest {
  string id = 1;
}

message RevertRejudgeResponse {
  string id = 1;
  int32 verdicts_restored = 2;   // number of submissions restored
  RejudgeStatus status = 3;      // should be REVERTED
}

message GetRejudgeSubmissionsRequest {
  string rejudge_id = 1;

  // Filters
  bool only_changed = 2;          // only show submissions with verdict changes
  RejudgeSubmissionStatus status = 3;

  common.v1.Pagination pagination = 4;
}

message GetRejudgeSubmissionsResponse {
  repeated RejudgeSubmission submissions = 1;
  common.v1.PaginatedResponse pagination = 2;
}

// Internal API messages
message InternalUpdateRejudgeSubmissionRequest {
  string rejudge_id = 1;
  string submission_id = 2;
  string new_judging_id = 3;
  string new_verdict = 4;
}

message InternalUpdateRejudgeSubmissionResponse {
  string status = 1;              // "updated"
}