services:
  # ============================================
  # Databases & Infrastructure
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: oj-postgres
    environment:
      POSTGRES_USER: oj
      POSTGRES_PASSWORD: oj
      POSTGRES_DB: oj
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oj-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: oj-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ============================================
  # Auth Service (Identra)
  # Two services required: gRPC + HTTP Gateway
  # ============================================

  # Create identra database
  identra-db-init:
    image: postgres:16-alpine
    container_name: oj-identra-db-init
    environment:
      PGUSER: oj
      PGPASSWORD: oj
      PGHOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "psql -c 'CREATE DATABASE identra;' || echo 'Database already exists'"

  identra-grpc:
    image: ghcr.io/poly-workshop/identra-grpc:latest
    container_name: oj-identra-grpc
    ports:
      - "50051:50051"
    volumes:
      - ./configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      identra-db-init:
        condition: service_completed_successfully

