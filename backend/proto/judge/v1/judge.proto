syntax = "proto3";

package judge.v1;

option go_package = "github.com/online-judge/backend/gen/go/judge/v1;judgev1";

import "google/api/annotations.proto";

// Judge Service - Judgehost registration, heartbeat, and task assignment
service JudgeService {
  // Register a judgehost and get assigned queue name
  rpc RegisterJudgehost(RegisterJudgehostRequest) returns (RegisterJudgehostResponse) {
    option (google.api.http) = {
      post: "/internal/judge/judgehosts"
      body: "*"
    };
  }

  // Send heartbeat to update judgehost status
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {
    option (google.api.http) = {
      post: "/internal/judge/judgehosts/{judgehost_id}/heartbeat"
      body: "*"
    };
  }

  // Assign a task to a judgehost based on load strategy
  rpc AssignTask(AssignTaskRequest) returns (AssignTaskResponse) {
    option (google.api.http) = {
      post: "/internal/judge/tasks/assign"
      body: "*"
    };
  }

  // List all registered judgehosts (for monitoring)
  rpc ListJudgehosts(ListJudgehostsRequest) returns (ListJudgehostsResponse) {
    option (google.api.http) = {
      get: "/internal/judge/judgehosts"
    };
  }

  // Get judgehost details
  rpc GetJudgehost(GetJudgehostRequest) returns (GetJudgehostResponse) {
    option (google.api.http) = {
      get: "/internal/judge/judgehosts/{judgehost_id}"
    };
  }

  // Deregister a judgehost
  rpc DeregisterJudgehost(DeregisterJudgehostRequest) returns (DeregisterJudgehostResponse) {
    option (google.api.http) = {
      delete: "/internal/judge/judgehosts/{judgehost_id}"
    };
  }
}

// Judgehost status
enum JudgehostStatus {
  JUDGEHOST_STATUS_UNSPECIFIED = 0;
  JUDGEHOST_STATUS_IDLE = 1;       // Available for tasks
  JUDGEHOST_STATUS_BUSY = 2;       // Currently processing a task
  JUDGEHOST_STATUS_OFFLINE = 3;    // Not responding to heartbeats
  JUDGEHOST_STATUS_ERROR = 4;      // In error state
}

// Judgehost capabilities
message JudgehostCapabilities {
  repeated string languages = 1;           // Supported languages (e.g., "cpp17", "python3")
  int32 max_concurrent_jobs = 2;           // Maximum concurrent judging jobs
  int64 memory_limit = 3;                  // Maximum memory per job (KB)
  double time_limit = 4;                   // Maximum time per job (seconds)
  bool supports_interactive = 5;           // Can handle interactive problems
  bool supports_special = 6;               // Can handle special judges
  map<string, string> extra = 7;           // Additional capabilities
}

// Judgehost info
message Judgehost {
  string id = 1;                           // Judgehost identifier
  string queue_name = 2;                   // Assigned queue name (e.g., "judgehost-001")
  JudgehostCapabilities capabilities = 3;  // Judgehost capabilities
  JudgehostStatus status = 4;              // Current status
  string current_job_id = 5;               // Current job being processed (if busy)
  string last_ping = 6;                    // Last heartbeat timestamp (RFC3339)
  int32 active_jobs = 7;                   // Number of active jobs
  int32 completed_jobs = 8;                // Total completed jobs
  string registered_at = 9;                // Registration timestamp (RFC3339)
}

// Request/Response messages
message RegisterJudgehostRequest {
  string judgehost_id = 1;                 // Unique judgehost identifier
  JudgehostCapabilities capabilities = 2;  // Judgehost capabilities
}

message RegisterJudgehostResponse {
  string judgehost_id = 1;
  string queue_name = 2;                   // Assigned queue name for this judgehost
  JudgehostStatus status = 3;              // Initial status (IDLE)
}

message HeartbeatRequest {
  string judgehost_id = 1;
  JudgehostStatus status = 2;              // Current status
  string current_job_id = 3;               // Current job ID (if busy)
  int32 active_jobs = 4;                   // Number of active jobs
  repeated string completed_job_ids = 5;   // Jobs completed since last heartbeat
}

message HeartbeatResponse {
  bool acknowledged = 1;
  int32 pending_tasks = 2;                 // Number of pending tasks in queue
  repeated string assigned_task_ids = 3;   // New tasks assigned (if status was IDLE)
}

message AssignTaskRequest {
  string submission_id = 1;                // Submission ID to assign
  string problem_id = 2;                   // Problem ID (for capability matching)
  string language_id = 3;                  // Language ID (for capability matching)
  int32 priority = 4;                      // Task priority (0=normal, higher=urgent)
  bool interactive = 5;                    // Requires interactive support
  bool special = 6;                        // Requires special judge support
}

message AssignTaskResponse {
  string submission_id = 1;
  string judgehost_id = 2;                 // Assigned judgehost (empty if queued to default)
  string queue_name = 3;                   // Queue name for the task
  bool assigned = 4;                       // Whether task was assigned to a specific judgehost
}

message ListJudgehostsRequest {
  JudgehostStatus status_filter = 1;       // Filter by status (optional)
  int32 page = 2;
  int32 page_size = 3;
}

message ListJudgehostsResponse {
  repeated Judgehost judgehosts = 1;
  int32 total = 2;
}

message GetJudgehostRequest {
  string judgehost_id = 1;
}

message GetJudgehostResponse {
  Judgehost judgehost = 1;
}

message DeregisterJudgehostRequest {
  string judgehost_id = 1;
  bool force = 2;                          // Force deregister even if busy
}

message DeregisterJudgehostResponse {
  string judgehost_id = 1;
  bool success = 2;
  int32 reassigned_tasks = 3;              // Number of tasks reassigned to other hosts
}